# Base Helm values for am-subscription
global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-subscription

replicaCount: 1
language: python
port: 8080
entrypoint: "exec uvicorn am_subscription.main:app --host 0.0.0.0 --port 8080"

security:
  automountServiceAccountToken: true

env:
  APP_ENV: production
  APP_NAME: am-subscription
  APP_PORT: "8080"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata
  AM_SUBSCRIPTION_POSTGRES_SSL: "false"
  DEFAULT_PLAN_CODE: am_free

probes:
  port: 8080
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health
  readiness:
    path: /health

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

ingress:
  enabled: false
