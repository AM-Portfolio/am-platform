# Production Environment — am-subscription
environment: prod
replicaCount: 1

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    otel:
      path: "apps/data/prod/infra/observability"
    # Infra is on apps KV (same as market/proxy). Service secrets still on secret/ mount.
    postgres:
      path: "apps/data/prod/infra/postgres"
    subscription:
      path: "secret/data/prod/services/am-subscription"
    lago:
      path: "secret/data/prod/services/am-lago"
    identity-oidc:
      path: "secret/data/prod/services/am-identity"
    service-oauth:
      path: "secret/data/prod/services/am-subscription"


env:
  APP_ENV: production
  LOG_LEVEL: INFO

# Prod app host (prep). Do not remove munish from infra Traefik.
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # CORS only — service routes already include /subscriptions (do not strip).
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-prod-global-cors@kubernetescrd
  hosts:
    - host: am.asrax.in
      paths:
        - path: /subscriptions
          pathType: Prefix
        - path: /webhooks/provider
          pathType: Prefix
