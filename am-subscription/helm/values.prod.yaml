# Production Environment — am-subscription
environment: prod
replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    postgres:
      path: "secret/data/prod/infra/postgres"
    subscription:
      path: "secret/data/prod/services/am-subscription"
    lago:
      path: "secret/data/prod/services/am-lago"
    identity-oidc:
      path: "secret/data/prod/services/am-identity"
    service-oauth:
      path: "secret/data/prod/services/am-subscription"


env:
  APP_ENV: production
  LOG_LEVEL: INFO
