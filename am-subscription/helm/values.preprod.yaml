# Preprod Environment — am-subscription
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    postgres:
      path: "apps/data/preprod/infra/postgres"
    subscription:
      path: "apps/data/preprod/services/am-subscription"
    lago:
      path: "apps/data/preprod/services/am-lago"


env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
  OIDC_ISSUER: "http://auth.munish.org/auth/realms/am-preprod-realm"
  OIDC_JWKS_URL: "http://auth.munish.org/auth/realms/am-preprod-realm/protocol/openid-connect/certs"

ingress:
  hosts:
    - host: am.asrax.in
      paths:
        - path: /webhooks/provider
          pathType: Prefix

