# Preprod Environment — am-subscription
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

vault:
  enabled: true
  secretPaths:
    postgres:
      path: "apps/data/preprod/infra/postgres"
    subscription:
      path: "apps/data/preprod/services/am-subscription"
    lago:
      path: "apps/data/preprod/services/am-lago"

ingress:
  enabled: false

env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
