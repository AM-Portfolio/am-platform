# Preprod Environment — am-subscription
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    otel:
      path: "apps/data/preprod/infra/observability"
    postgres:
      path: "apps/data/preprod/infra/postgres"
    subscription:
      path: "apps/data/preprod/services/am-subscription"
    lago:
      path: "apps/data/preprod/services/am-lago"
    identity-oidc:
      path: "apps/data/preprod/services/am-identity"
    service-oauth:
      path: "apps/data/preprod/services/am-subscription"


env:
  APP_ENV: preprod
  LOG_LEVEL: INFO

# Preprod app host only — am.asrax.in is owned by prod (no Host collision)
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # CORS only — service routes already include /subscriptions (do not strip).
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-preprod-global-cors@kubernetescrd
  hosts:
    - host: am-preprod.asrax.in
      paths:
        - path: /subscriptions
          pathType: Prefix
        - path: /webhooks/provider
          pathType: Prefix
