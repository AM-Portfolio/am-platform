# Production Environment — am-identity
environment: prod
replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    identity:
      path: "secret/data/prod/services/am-identity"


env:
  APP_ENV: production
  LOG_LEVEL: INFO
