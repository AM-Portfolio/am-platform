# Production Environment — am-identity
environment: prod
replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    keycloak:
      path: "secret/data/prod/services/am-identity"
    auth:
      path: "secret/data/prod/services/am-auth"

ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: am.asrax.in
      paths:
        - path: /api/auth
          pathType: Prefix
        - path: /api/users
          pathType: Prefix

env:
  APP_ENV: production
  LOG_LEVEL: INFO
