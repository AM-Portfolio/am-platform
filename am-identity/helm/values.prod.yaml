# Production Environment — am-identity
environment: prod
replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    identity:
      path: "secret/data/prod/services/am-identity"


env:
  APP_ENV: production
  LOG_LEVEL: INFO

# Prod app host (prep). Do not remove munish from infra Traefik.
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-prod-global-cors@kubernetescrd
  hosts:
    - host: am.asrax.in
      paths:
        - path: /identity
          pathType: Prefix
