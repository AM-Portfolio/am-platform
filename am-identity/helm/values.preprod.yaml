# Preprod Environment — am-identity
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    identity:
      path: "apps/data/preprod/services/am-identity"


env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
