# Preprod Environment — am-identity
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

vault:
  enabled: true
  secretPaths:
    keycloak:
      path: "apps/data/preprod/services/am-identity"
    auth:
      path: "apps/data/preprod/services/am-auth"

ingress:
  enabled: false

env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
