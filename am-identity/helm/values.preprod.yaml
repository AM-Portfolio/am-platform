# Preprod Environment — am-identity
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    identity:
      path: "apps/data/preprod/services/am-identity"


env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
  IDENTITY_VERIFY_SSL: "false"

# Dual-host: am-preprod (target) + am.asrax.in (current preprod until Phase 4)
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-preprod-global-cors@kubernetescrd,
      am-apps-preprod-strip-prefix-apps@kubernetescrd
  hosts:
    - host: am-preprod.asrax.in
      paths:
        - path: /identity
          pathType: Prefix
    - host: am.asrax.in
      paths:
        - path: /identity
          pathType: Prefix

