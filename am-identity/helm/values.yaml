# Base Helm values for am-identity
# Deployed via AM-Portfolio/am-pipelines universal-chart
global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-identity

replicaCount: 1
language: python
port: 8080
service:
  port: 8080
entrypoint: "exec uvicorn am_identity.main:app --host 0.0.0.0 --port 8080"

security:
  automountServiceAccountToken: true

# Empty stub — universal-chart batchSearch/scheduler templates require config to exist
config: {}

env:
  APP_ENV: production
  APP_NAME: am-identity
  APP_PORT: "8080"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata

probes:
  port: 8080
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health
  readiness:
    path: /health

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-preprod-global-cors@kubernetescrd,
      am-apps-preprod-strip-prefix-apps@kubernetescrd
  hosts:
    - host: am.asrax.in
      paths:
        - path: /identity
          pathType: Prefix
