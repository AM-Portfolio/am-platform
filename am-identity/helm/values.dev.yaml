# Dev Environment — am-identity
environment: dev
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

hostAliases:
  - ip: "203.174.22.129"
    hostnames:
      - "auth.munish.org"

vault:
  enabled: true
  secretPaths:
    identity:
      path: "apps/data/dev/services/am-identity"

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-dev-dev-global-cors@kubernetescrd,
      am-apps-dev-dev-strip-prefix@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /identity
          pathType: Prefix

env:
  APP_ENV: dev
  LOG_LEVEL: DEBUG
