# Production Environment overrides for am-mcp-gateway
environment: production
replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    redis:
      path: "apps/data/prod/infra/redis"
    llm-api-keys:
      path: "apps/data/prod/services/am-mcp-gateway"
    identity-oidc:
      path: "apps/data/prod/services/am-identity"
    observability:
      path: "apps/data/prod/services/am-mcp-gateway"

env:
  APP_ENV: production
  LOG_LEVEL: INFO
