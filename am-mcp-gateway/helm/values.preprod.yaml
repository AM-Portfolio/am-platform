# Preprod Environment overrides for am-mcp-gateway
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

vault:
  enabled: true
  secretPaths:
    redis:
      path: "apps/data/preprod/infra/redis"
    llm-api-keys:
      path: "apps/data/preprod/services/am-mcp-gateway"
    identity-oidc:
      path: "apps/data/preprod/services/am-identity"
    observability:
      path: "apps/data/preprod/services/am-mcp-gateway"

env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
  LLM_MODEL: together_ai/meta-llama/Meta-Llama-3-8B-Instruct-Lite
  LLM_FALLBACK_CHAIN: litellm
  UI_TEST_AGENT_BASE_URL: "http://am-ui-test-agent.am-apps-preprod.svc.cluster.local:8130"
  DB_AGENT_BASE_URL: "http://am-db-agent.am-apps-preprod.svc.cluster.local:8140"
  TOOL_AGENT_BASE_URL: "http://am-tool-agent.am-apps-preprod.svc.cluster.local:8141"
  MCP_GATEWAY_PUBLIC_URL: "https://am.asrax.in/mcp"
  # Match local .env.preprod — internal langfuse.am-ai URL was failing ingestion silently
  LANGFUSE_ENABLED: "true"
  LANGFUSE_HOST: "https://langfuse.munish.org"
  LANGFUSE_FLUSH_INTERVAL_SECONDS: "5"
  # MLflow sync logging blocks the event loop and caused Langfuse 5s gather timeouts
  MLFLOW_ENABLED: "false"
