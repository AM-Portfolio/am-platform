name: Debug K8s Logs

on:
  push:
    branches:
      - feature/account-deletion

jobs:
  fetch-logs:
    runs-on: [self-hosted, linux]
    steps:
      - name: Run docker image directly
        run: |
          echo "=== RUNNING DOCKER IMAGE LOCALLY ==="
          docker run --rm ghcr.io/am-portfolio/am-identity:29751321751 || echo "Docker run failed"
