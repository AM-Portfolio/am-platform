name: Debug Fetch Logs

on:
  push:
    branches: ["feature/account-deletion"]

jobs:
  fetch-logs:
    runs-on: self-hosted
    steps:
      - name: Fetch Pod Logs
        run: |
          echo "=== CRASHING POD LOGS ==="
          kubectl logs -n am-apps-dev am-identity-76788545f7-psrz5 -c am-identity --tail=200 || echo "Failed to fetch logs"


