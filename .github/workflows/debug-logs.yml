name: Debug K8s Logs

on:
  push:
    branches:
      - feature/account-deletion

jobs:
  fetch-logs:
    runs-on: [self-hosted, linux]
    steps:
      - name: Fetch am-identity logs
        run: |
          echo "=== AM-IDENTITY LOGS ==="
          kubectl get pods -n am-apps-dev -l app=am-identity --sort-by=.metadata.creationTimestamp
          echo "Logs of newest pod:"
          POD=kubectl get pods -n am-apps-dev -l app=am-identity --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}'
          kubectl logs pod/ -n am-apps-dev -c am-identity || echo "Failed to get logs for am-identity"
          kubectl describe pod  -n am-apps-dev || true
