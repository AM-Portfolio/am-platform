name: Debug Fetch Logs

on:
  push:
    branches: ["feature/account-deletion"]

jobs:
  fetch-logs:
    runs-on: self-hosted
    steps:
      - name: Fetch Pods and Namespaces
        run: |
          echo "=== NAMESPACES ==="
          kubectl get namespaces
          echo "=== ALL AM-IDENTITY PODS ==="
          kubectl get pods -A | grep am-identity || echo "No am-identity pods found in any namespace"

