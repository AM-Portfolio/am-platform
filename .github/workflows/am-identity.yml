name: AM Identity Publish

on:
  push:
    branches: ["main", "develop", "test/**", "feature/**", "hotfix/**", "fix/**"]
    paths:
      - "am-identity/**"
      - "libraries/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".dockerignore"
      - "docker/**"
  pull_request:
    branches: ["main", "develop", "test/**", "feature/**", "hotfix/**", "fix/**"]
    paths:
      - "am-identity/**"
      - "libraries/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".dockerignore"
      - "docker/**"
  workflow_dispatch:

jobs:
  publish:
    name: Publish AM Identity
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: "python"
      working_directory: "am-identity"
      image_name: "am-identity"
      build_context: ".."
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      # Deploy to dev is enabled for feature branches so developers can review
      # their deployments. If CrashLoopBackOff occurs, we will debug it in cluster.
      deploy_dev: true
      deploy_prod: true
    secrets: inherit
