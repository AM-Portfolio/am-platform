name: AM Platform CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - "am-identity/**"
      - "am-subscription/**"
      - "am-notification/**"
      - "libraries/**"
      - "requirements*.txt"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "am-identity/**"
      - "am-subscription/**"
      - "am-notification/**"
      - "libraries/**"
      - "requirements*.txt"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ./libraries/am-platform-common ./libraries/am-platform-security

      - name: Run Ruff Linter
        run: ruff check am-identity am-subscription am-notification libraries

      - name: Run Black Code Formatter Check
        run: black --check am-identity am-subscription am-notification libraries

      - name: Run Unit Tests
        env:
          PYTHONPATH: libraries/am-platform-common:libraries/am-platform-security
        run: pytest libraries/am-platform-common/tests/
