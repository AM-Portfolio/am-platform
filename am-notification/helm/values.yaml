# Base Helm values for am-notification
global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-notification

replicaCount: 1
language: python
port: 8080
service:
  port: 8080
entrypoint: "exec uvicorn am_notification.main:app --host 0.0.0.0 --port 8080"

security:
  automountServiceAccountToken: true

# Empty stub — universal-chart batchSearch/scheduler templates require config to exist
config: {}

# Vault key→env mappings live here so base+env values alone are enough for CI
# (central-deploy used to omit vault-mappings.yaml). Env files only override paths.
vault:
  secretPaths:
    mongodb:
      mappings:
        AM_NOTIFICATION_MONGO_URI: "url"
        AM_NOTIFICATION_MONGO_DATABASE: "AM_NOTIFICATION_MONGO_DATABASE"
        AM_NOTIFICATION_DB_USER: "AM_NOTIFICATION_DB_USER"
        AM_NOTIFICATION_DB_PASSWORD: "AM_NOTIFICATION_DB_PASSWORD"
    kafka:
      mappings:
        KAFKA_BOOTSTRAP_SERVERS: "bootstrap_servers"
        KAFKA_USERNAME: "username"
        KAFKA_PASSWORD: "password"
        KAFKA_SECURITY_PROTOCOL: "KAFKA_SECURITY_PROTOCOL"
        KAFKA_SASL_MECHANISM: "KAFKA_SASL_MECHANISM"
        AM_NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS: "bootstrap_servers"
    notification:
      mappings:
        AM_NOTIFICATION_CLIENT_ID: "AM_NOTIFICATION_CLIENT_ID"
        AM_NOTIFICATION_CLIENT_SECRET: "AM_NOTIFICATION_CLIENT_SECRET"
        NOTIFICATION_PROVIDER: "NOTIFICATION_PROVIDER"
        NOVU_APPLICATION_IDENTIFIER: "NOVU_APPLICATION_IDENTIFIER"
        KAFKA_ENABLED: "KAFKA_ENABLED"
    novu:
      mappings:
        NOVU_API_URL: "NOVU_API_URL"
        NOVU_API_KEY: "NOVU_API_KEY"
    identity-oidc:
      mappings:
        OIDC_JWKS_URL: "OIDC_JWKS_URL"
        OIDC_ISSUER: "OIDC_ISSUER"
    service-oauth:
      mappings:
        OAUTH2_CLIENT_ID: "AM_NOTIFICATION_CLIENT_ID"
        OAUTH2_CLIENT_SECRET: "AM_NOTIFICATION_CLIENT_SECRET"

env:
  APP_ENV: production
  APP_NAME: am-notification
  APP_PORT: "8080"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata
  KAFKA_NOTIFICATION_GROUP_ID: am-notification-consumer
  KAFKA_NOTIFICATION_TOPICS: am.identity.events.v1,am.subscription.events.v1,am.usage.events.v1,am.notification.commands.v1
  KAFKA_NOTIFICATION_EVENTS_TOPIC: am.notification.events.v1
  KAFKA_NOTIFICATION_DLQ_TOPIC: am.notification.commands.dlq.v1

probes:
  port: 8080
  startup:
    path: /health/live
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health/live
  readiness:
    path: /health/ready

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Host list is environment-specific — see values.preprod.yaml / values.prod.yaml
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts: []
