# DEPRECATED for CI completeness — mappings are also in values.yaml so base+env
# files alone work. Kept for workflows that still pass -f vault-mappings.yaml.
vault:
  secretPaths:
    mongodb:
      mappings:
        AM_NOTIFICATION_MONGO_URI: "url"
        AM_NOTIFICATION_MONGO_DATABASE: "AM_NOTIFICATION_MONGO_DATABASE"
        AM_NOTIFICATION_DB_USER: "AM_NOTIFICATION_DB_USER"
        AM_NOTIFICATION_DB_PASSWORD: "AM_NOTIFICATION_DB_PASSWORD"
    kafka:
      mappings:
        KAFKA_BOOTSTRAP_SERVERS: "bootstrap_servers"
        KAFKA_USERNAME: "username"
        KAFKA_PASSWORD: "password"
        KAFKA_SECURITY_PROTOCOL: "KAFKA_SECURITY_PROTOCOL"
        KAFKA_SASL_MECHANISM: "KAFKA_SASL_MECHANISM"
        AM_NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS: "bootstrap_servers"
    notification:
      mappings:
        AM_NOTIFICATION_CLIENT_ID: "AM_NOTIFICATION_CLIENT_ID"
        AM_NOTIFICATION_CLIENT_SECRET: "AM_NOTIFICATION_CLIENT_SECRET"
        NOTIFICATION_PROVIDER: "NOTIFICATION_PROVIDER"
        NOVU_APPLICATION_IDENTIFIER: "NOVU_APPLICATION_IDENTIFIER"
        KAFKA_ENABLED: "KAFKA_ENABLED"
    novu:
      mappings:
        NOVU_API_URL: "NOVU_API_URL"
        NOVU_API_KEY: "NOVU_API_KEY"
    identity-oidc:
      mappings:
        OIDC_JWKS_URL: "OIDC_JWKS_URL"
        OIDC_ISSUER: "OIDC_ISSUER"
    service-oauth:
      mappings:
        OAUTH2_CLIENT_ID: "AM_NOTIFICATION_CLIENT_ID"
        OAUTH2_CLIENT_SECRET: "AM_NOTIFICATION_CLIENT_SECRET"

    otel:
      mappings:
        TRACING_SAMPLING_PROBABILITY: "TRACING_SAMPLING_PROBABILITY"
