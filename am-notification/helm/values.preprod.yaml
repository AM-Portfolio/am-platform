# Preprod Environment — am-notification
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    mongodb:
      path: "apps/data/preprod/infra/mongodb"
    kafka:
      path: "apps/data/preprod/infra/kafka"
    notification:
      path: "apps/data/preprod/services/am-notification"
    novu:
      path: "apps/data/preprod/services/am-novu"



env:
  APP_ENV: preprod
  LOG_LEVEL: INFO
  OIDC_ISSUER: "http://auth.munish.org/auth/realms/am-preprod-realm"
  OIDC_JWKS_URL: "http://auth.munish.org/auth/realms/am-preprod-realm/protocol/openid-connect/certs"
