# Preprod Environment — am-notification
environment: preprod
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 1m
    memory: 64Mi

vault:
  enabled: true
  secretPaths:
    mongodb:
      path: "apps/data/preprod/infra/mongodb"
    kafka:
      path: "apps/data/preprod/infra/kafka"
    notification:
      path: "apps/data/preprod/services/am-notification"
    novu:
      path: "apps/data/preprod/services/am-novu"
    identity-oidc:
      path: "apps/data/preprod/services/am-identity"
    service-oauth:
      path: "apps/data/preprod/services/am-notification"



env:
  APP_ENV: preprod
  LOG_LEVEL: INFO

# Preprod app host only — am.asrax.in is owned by prod (no Host collision)
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # CORS only — service routes already include /notifications (do not strip).
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-preprod-global-cors@kubernetescrd
  hosts:
    - host: am-preprod.asrax.in
      paths:
        - path: /notifications
          pathType: Prefix
        - path: /webhooks/novu
          pathType: Prefix
