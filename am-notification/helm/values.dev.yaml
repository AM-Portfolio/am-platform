# Dev Environment — am-notification
environment: dev
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

hostAliases:
  - ip: "203.174.22.129"
    hostnames:
      - "mongodb.asrax.in"
      - "kafka.asrax.in"
      - "novu-api.asrax.in"

vault:
  enabled: true
  secretPaths:
    mongodb:
      path: "apps/data/dev/infra/mongodb"
    kafka:
      path: "apps/data/dev/infra/kafka"
    notification:
      path: "apps/data/dev/services/am-notification"
    novu:
      path: "apps/data/dev/services/am-novu"
    identity-oidc:
      path: "apps/data/dev/services/am-identity"
    service-oauth:
      path: "apps/data/dev/services/am-notification"

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-dev-dev-global-cors@kubernetescrd,
      am-apps-dev-dev-strip-prefix@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /notifications
          pathType: Prefix
        - path: /webhooks/novu
          pathType: Prefix

env:
  APP_ENV: dev
  LOG_LEVEL: DEBUG
  KAFKA_ENABLED: "false"
