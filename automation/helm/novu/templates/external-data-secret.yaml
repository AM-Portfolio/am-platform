{{- if and .Values.externalDataStores.enabled (not .Values.mongodb.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novu.fullname" . }}-external-data
  labels:
    {{- include "novu.labels" . | nindent 4 }}
type: Opaque
stringData:
  MONGO_URL: {{ .Values.externalDataStores.mongoUrl | quote }}
  REDIS_PASSWORD: {{ .Values.externalDataStores.redisPassword | quote }}
{{- end }}
