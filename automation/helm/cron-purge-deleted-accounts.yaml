apiVersion: batch/v1
kind: CronJob
metadata:
  name: purge-deleted-accounts
  namespace: am-platform
spec:
  schedule: "0 0 * * *" # Run at midnight every day
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: purge-deleted-accounts
            image: asrax/am-automation-scripts:latest # Assuming scripts are packaged into an image
            command:
            - python
            - "/scripts/purge_deleted_accounts.py"
            env:
            - name: KEYCLOAK_URL
              value: "http://keycloak.infra.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "am"
            - name: KEYCLOAK_ADMIN_USER
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.infra.svc.cluster.local:9092"
          restartPolicy: OnFailure
