apiVersion: batch/v1
kind: CronJob
metadata:
  name: purge-deleted-accounts
  namespace: am-apps-dev
spec:
  schedule: "0 0 * * *" # Run at midnight every day
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-init-first: "true"
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/agent-inject-secret-identity: apps/data/dev/services/am-identity
            vault.hashicorp.com/agent-inject-template-identity: |
              {{- with secret "apps/data/dev/services/am-identity" -}}
              {{- with index .Data.data "KEYCLOAK_ADMIN_PASSWORD" }}
              export KEYCLOAK_ADMIN_PASSWORD="{{ . }}"
              {{ end }}
              {{- with index .Data.data "PURGE_ENABLED" }}
              export PURGE_ENABLED="{{ . }}"
              {{ end }}
              {{- with index .Data.data "PURGE_PERIOD_DAYS" }}
              export PURGE_PERIOD_DAYS="{{ . }}"
              {{ end }}
              {{- with index .Data.data "PURGE_PERIOD_MINUTES" }}
              export PURGE_PERIOD_MINUTES="{{ . }}"
              {{ end }}
              {{- end }}
            vault.hashicorp.com/auth-path: auth/kubernetes
            vault.hashicorp.com/role: am-backend-role
        spec:
          serviceAccountName: am-backend-sa
          imagePullSecrets:
          - name: regcred
          containers:
          - name: purge-deleted-accounts
            image: ghcr.io/am-portfolio/am-identity:latest # Package scripts inside am-identity image
            command:
            - /bin/sh
            - -c
            - |
              . /vault/secrets/identity 2>/dev/null || true
              python /app/automation/scripts/purge_deleted_accounts.py
            env:
            - name: KEYCLOAK_URL
              value: "http://keycloak.infra.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "am"
            - name: KEYCLOAK_ADMIN_USER
              value: "admin"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.infra.svc.cluster.local:9092"
          restartPolicy: OnFailure
